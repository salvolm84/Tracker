name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
          - name: windows
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build native bundle
        if: matrix.name == 'macos'
        run: npm run tauri -- build --bundles app

      - name: Build portable Windows executable
        if: matrix.name == 'windows'
        run: npm run tauri -- build --no-bundle

      - name: Sign macOS app (ad-hoc)
        if: matrix.name == 'macos'
        shell: bash
        run: |
          app_path="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No macOS app bundle found"
            exit 1
          fi
          codesign --force --deep --sign - "$app_path"

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ matrix.name }}" = "macos" ]; then
            app_path="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
            if [ -z "$app_path" ]; then
              echo "No macOS app bundle found"
              exit 1
            fi
            ditto -c -k --sequesterRsrc --keepParent \
              "$app_path" \
              "release/Tracker_${GITHUB_REF_NAME}_${{ matrix.name }}_${RUNNER_ARCH}.zip"
          else
            exe_path="$(find src-tauri/target/release -maxdepth 1 -type f -name '*.exe' -print -quit)"
            if [ -z "$exe_path" ]; then
              echo "No Windows executable found"
              exit 1
            fi
            cp "$exe_path" "release/Electronics.Application.Engineering_${GITHUB_REF_NAME}_windows_x64_portable.exe"
          fi

      - name: Upload release candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tracker-${{ matrix.name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release notes
        run: |
          cat > release-notes.md <<'NOTES'
          Tracker desktop release.

          Artifacts are built by GitHub Actions on native macOS and Windows runners.

          **macOS:** download the zip, extract it, and open Tracker.app.
          The app is ad-hoc signed but not notarized. On first launch macOS may warn
          that the developer cannot be verified — right-click the app and choose Open
          to bypass this once.

          **Windows:** download the portable EXE and run it in place. No installer is required.
          NOTES

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "Tracker $TAG_NAME" --notes-file release-notes.md
          find release-assets -type f -print0 | xargs -0 gh release upload "$TAG_NAME" --clobber
